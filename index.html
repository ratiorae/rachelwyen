<script>
// When the user clicks on div, open the popup
let popupTimeout;

function myFunction() {
  var popup = document.getElementById("myPopup");

  // Clear previous timers and classes
  clearTimeout(popupTimeout);
  popup.classList.remove("fadeOut");
  popup.classList.add("show");

  // After 3 seconds, fade out
  popupTimeout = setTimeout(function() {
    popup.classList.remove("show");
    popup.classList.add("fadeOut");
  }, 3000);
}

/* Popup container - can be anything you want */
.popup {
  position: relative;
  display: inline-block;
  cursor: pointer;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

/* The actual popup */
.popup .popuptext {
  visibility: hidden;
  opacity: 0;
  width: 160px;
  background-color: {color:Marquee background};
  color: #fff;
  text-align: center;
  border-radius: 6px;
  padding: 8px 0;
  position: absolute;
  z-index: 1;
  bottom: 125%;
  left: 50%;
  margin-left: -80px;
  transition: opacity 0.5s ease;
}

/* Popup arrow */
.popup .popuptext::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 50%;
  margin-left: -5px;
  border-width: 5px;
  border-style: solid;
  border-color: {color:Marquee background} transparent transparent transparent;
}

/* Show popup with fade-in */
.popup .show {
  visibility: visible;
  opacity: 1;
  animation: fadeIn 0.5s forwards;
}

/* Add fadeOut animation */
.popup .fadeOut {
  animation: fadeOut 0.5s forwards;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes fadeOut {
  0% { opacity: 1; visibility: visible;}
  100% { opacity: 0; visibility: hidden; }
}

<script>
document.addEventListener("DOMContentLoaded", function () {
  const titleEl = document.getElementById("title");
  const originalText = titleEl.textContent.trim();

  function animateTitle() {
    titleEl.textContent = ""; // Clear existing content

    const words = originalText.split(" ");

    words.forEach((word, wordIndex) => {
      const wordSpan = document.createElement("span");
      wordSpan.className = "word";

      [...word].forEach((char, i) => {
        const letterSpan = document.createElement("span");
        letterSpan.className = "letter";
        letterSpan.textContent = char;
        letterSpan.style.animationDelay = `${(wordIndex * 0.2 + i * 0.05)}s`;
        wordSpan.appendChild(letterSpan);
      });

      titleEl.appendChild(wordSpan);
      titleEl.appendChild(document.createTextNode(" ")); // add space between words
    });
  }

  animateTitle();

  // Re-trigger every 15 seconds
  setInterval(() => {
    titleEl.innerHTML = "";
    animateTitle();
  }, 15000);
});
</script>
